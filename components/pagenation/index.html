<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Pagination</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen py-12">
    <div class="max-w-6xl mx-auto px-4">
        <!-- Header -->
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">Artikel Terbaru</h1>
            <p class="text-gray-600">
                Halaman saat ini: <span id="current-page-display" class="font-semibold text-indigo-600">1</span>
            </p>
        </div>

        <!-- Grid Card Artikel -->
        <div id="article-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
            <!-- Card Artikel akan di-generate oleh JavaScript -->
        </div>

        <!-- Pagination -->
        <div class="w-full flex justify-center">
            <div id="pagination"
                class="flex items-center gap-1 px-8 bg-white shadow-lg rounded-2xl py-3 flex-wrap justify-center">
            </div>
        </div>
    </div>
    <script src="script.js" type="text/javascript"></script>
</body>
</html>
